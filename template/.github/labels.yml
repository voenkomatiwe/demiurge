# Declarative label definitions.
# Applied to the repo by .github/workflows/sync-labels.yml on push.
#
# Color convention (approximate):
#   area:*      green/blue  — which domain or subtopic
#   role:*      yellow      — who owns it
#
# "What kind of work" is NOT a label — use the native GitHub Issue Type
# (Bug / Feature / Task / custom). "What state is work in" is also NOT a
# label — use the Project Status field (Ready / In progress / Review /
# Blocked / Done). Labels stay as stable metadata: domain + responsible role.
#
# Feel free to tune colors to your org's palette; just keep the prefix scheme.

# --- Domain area ---
- name: "area:web"
  color: "0E8A16"
  description: "Web application domain (frontend + backend)"
- name: "area:contracts"
  color: "5319E7"
  description: "Smart contracts domain"
- name: "area:design"
  color: "D93F0B"
  description: "Design system / visual domain"
- name: "area:product"
  color: "1D76DB"
  description: "Product definition (vision, scope, glossary)"

# --- Subtopics (orthogonal to domain) ---
- name: "area:architecture"
  color: "C2E0C6"
  description: "Architectural changes"
- name: "area:api"
  color: "BFD4F2"
  description: "HTTP or ABI contract boundary"
- name: "area:ui"
  color: "FBCA04"
  description: "User interface"
- name: "area:data-model"
  color: "A2EEEF"
  description: "Database / persistence"
- name: "area:auth"
  color: "B60205"
  description: "Authentication / authorization"
- name: "area:security"
  color: "B60205"
  description: "Security-relevant changes"
- name: "area:deployment"
  color: "C5DEF5"
  description: "Deploy pipelines / infra"
- name: "area:stack"
  color: "C5DEF5"
  description: "Framework / library versions"
- name: "area:scope"
  color: "BFDADC"
  description: "MVP scope boundaries"

# --- Roles ---
- name: "role:frontend"
  color: "FEF2C0"
  description: "Frontend owns this"
- name: "role:backend"
  color: "FEF2C0"
  description: "Backend owns this"
- name: "role:smartcontract"
  color: "FEF2C0"
  description: "Smart contracts owns this"
- name: "role:designer"
  color: "FEF2C0"
  description: "Designer owns this"
- name: "role:pm"
  color: "FEF2C0"
  description: "PM owns this"
- name: "role:reviewer"
  color: "FEF2C0"
  description: "Reviewer is involved"


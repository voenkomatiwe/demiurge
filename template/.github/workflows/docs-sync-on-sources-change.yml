name: Docs sync — sources changed

on:
  pull_request:
    paths:
      - "docs/sources/**"
  push:
    branches: [main]
    paths:
      - "docs/sources/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  detect-stale-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed sources
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            HEAD="HEAD"
          else
            BASE="HEAD^"
            HEAD="HEAD"
          fi
          git fetch origin "${{ github.base_ref || 'main' }}" --depth=1 || true
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'docs/sources/**' | grep -v '/README.md$' | grep -v '/\.gitkeep$' || true)
          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find synthesized docs that reference changed sources
        id: stale
        if: steps.changed.outputs.files != ''
        shell: bash
        run: |
          set -euo pipefail
          STALE=""
          while IFS= read -r src; do
            [ -z "$src" ] && continue
            # Match frontmatter "based-on:" entries that reference this source.
            MATCHES=$(grep -rlE "based-on:" docs \
              --include='*.md' \
              --exclude-dir=sources \
              | xargs -r grep -lE "^[[:space:]]*-[[:space:]]+${src//\//\\/}([[:space:]]|$)" || true)
            STALE="$STALE"$'\n'"$MATCHES"
          done <<< "${{ steps.changed.outputs.files }}"
          STALE=$(echo "$STALE" | grep -v '^$' | sort -u || true)
          {
            echo "docs<<EOF"
            echo "$STALE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.stale.outputs.docs != ''
        uses: actions/github-script@v7
        with:
          script: |
            const changed = `${{ steps.changed.outputs.files }}`.split('\n').filter(Boolean);
            const stale   = `${{ steps.stale.outputs.docs }}`.split('\n').filter(Boolean);
            const body = [
              '⚠️  **Potentially stale synthesized docs**',
              '',
              'Sources changed in this PR:',
              ...changed.map(f => `- \`${f}\``),
              '',
              'These synthesized docs reference the changed sources via `based-on:` and may need re-synthesis:',
              ...stale.map(f => `- \`${f}\``),
              '',
              'After merge, a `docs-sync` issue will be opened for the PM to handle re-synthesis.'
            ].join('\n');
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Open docs-sync issue on main
        if: github.event_name == 'push' && steps.stale.outputs.docs != ''
        uses: actions/github-script@v7
        with:
          script: |
            const changed = `${{ steps.changed.outputs.files }}`.split('\n').filter(Boolean);
            const stale   = `${{ steps.stale.outputs.docs }}`.split('\n').filter(Boolean);

            // Derive area:<domain> labels from the paths of stale synthesized docs.
            // docs/web/architecture.md -> area:web
            // docs/contracts/... -> area:contracts
            // docs/design/... -> area:design
            // Top-level docs (docs/vision.md etc.) -> area:product
            const KNOWN_DOMAINS = new Set(['web', 'contracts', 'design']);
            const areaLabels = new Set();
            for (const p of stale) {
              const m = p.match(/^docs\/([^/]+)\//);
              if (m && KNOWN_DOMAINS.has(m[1])) {
                areaLabels.add(`area:${m[1]}`);
              } else if (p.startsWith('docs/') && !m) {
                areaLabels.add('area:product');
              }
            }

            const body = [
              '## Source files that changed',
              ...changed.map(f => `- \`${f}\``),
              '',
              '## Potentially stale synthesized docs',
              ...stale.map(f => `- \`${f}\``),
              '',
              '## Link to diff',
              `${context.payload.compare}`,
              '',
              '---',
              '_Auto-created by docs-sync-on-sources-change workflow._'
            ].join('\n');
            await github.rest.issues.create({
              ...context.repo,
              title: `[Docs sync] Re-synthesize after sources update (${changed.length} file${changed.length === 1 ? '' : 's'})`,
              body,
              labels: ['type:docs-sync', 'role:pm', 'status:ready', ...areaLabels]
            });
